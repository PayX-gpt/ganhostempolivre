name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - claude/multi-step-quiz-QQNaS
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Force base path in vite.config.ts (resilience vs. upstream reverts)
        run: |
          # Lovable periodically resets vite.config.ts to have `base: "/"`.
          # Match both inline and const-declared forms and rewrite them to the
          # GitHub Pages subpath so asset URLs resolve correctly.
          if grep -qE '^  base: "/",' vite.config.ts; then
            sed -i 's|^  base: "/",|  base: mode === "production" ? "/ganhostempolivre/" : "/",|' vite.config.ts
            echo "Patched inline base to /ganhostempolivre/."
          elif grep -qE 'const base = "/"' vite.config.ts; then
            sed -i 's|const base = "/"|const base = mode === "production" ? "/ganhostempolivre/" : "/"|' vite.config.ts
            echo "Patched const base to /ganhostempolivre/."
          else
            echo "vite.config.ts already has subpath base logic. No patch needed."
          fi
          grep -nE "base:.*ganhostempolivre|const base" vite.config.ts

      - name: Ensure SPA 404 decoder is present in index.html
        run: |
          if ! grep -q "pathSegmentsToKeep\|SPA" index.html 2>/dev/null; then
            echo "SPA decoder missing in index.html, injecting it..."
            python3 - <<'PY'
          import re
          with open('index.html', 'r') as f:
              content = f.read()
          snippet = """    <!-- Single Page Apps for GitHub Pages: decode redirect from 404.html. -->
              <script>
                (function(l) {
                  if (l.search[1] === '/') {
                    var decoded = l.search.slice(1).split('&').map(function(s) {
                      return s.replace(/~and~/g, '&');
                    }).join('?');
                    window.history.replaceState(null, null,
                      l.pathname.slice(0, -1) + decoded + l.hash
                    );
                  }
                }(window.location))
              </script>
          """
          content = re.sub(r'(<body>\s*)', r'\1\n' + snippet, content, count=1)
          with open('index.html', 'w') as f:
              f.write(content)
          PY
          else
            echo "SPA decoder already present in index.html."
          fi

      - name: Build
        run: bun run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
